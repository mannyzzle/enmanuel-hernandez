- name: "COSMO LLM: Scalable AI for Space, Engineering & Scientific Discovery"
  descr: "Fine-tuned a transformer-based LLM on MPT-30B from MosaicML to specialize in scientific computing, physical engineering, and automated data analysis. COSMO ingests datasets from AWS S3 and uses Apache Spark for scalable training. It generates insights, summaries with raw data, time series, and sensor feeds. Built on Databricks for data prep and deployed with Kubernetes, COSMO supports domains like aerospace telemetry, materials modeling, and satellite operations."
  demo: https://github.com/mannyzzle/COSMO-LLM
  tags:
    - tag: Transformers
    - tag: Data Analytics
    - tag: AWS S3
    - tag: Apache Spark
    - tag: Databricks
    - tag: Kubernetes
    - tag: Python


- name: "Prep Studio"
  descr: "Spaced-repetition flashcards for the concepts that show up in interviews and on-call pages — databases, pipelines, distributed systems, and the rest of the usual suspects. 295 pregenerated flip + multiple-choice cards across 19 domains, Leitner scheduling in the browser, keyboard-first UX, no login, no tracking. React 19 + Vite + Tailwind on the frontend, FastAPI behind it, deployed on Railway."
  demo: https://prep-studio-production.up.railway.app/
  tags:
    - tag: React
    - tag: TypeScript
    - tag: Tailwind
    - tag: FastAPI
    - tag: Python
    - tag: Railway

- name: "Satellite Fleet Optimization Web Application"
  descr: "Developed a full-stack web application with a 3D UI for exploring orbits around the globe & with AI enhanced orbital prediction using LSTM tracking that learns in real time. Integrated a PostgresSQL backend by AWS for satellite data and a React frontend for dynamic visualization/interaction."
  demo: https://mannyzzle.github.io/Satellite-Interactive-Visualizer-And-Fleet-Optimization/
  tags:
    - tag: Full-Stack Development
    - tag: AWS RDS
    - tag: JavaScript
    - tag: React/Node.js
    - tag: PostgreSQL
    - tag: Python Scripting
    - tag: 

- name: "SAM 3D — Single-Image 3D Reconstruction"
  descr: "Built on top of Meta’s SAM model, SAM 3D reconstructs full 3D shape, texture, and layout from a single 2D image — enabling real-world object and scene modeling even under occlusion or clutter."  
  demo: https://www.aidemos.meta.com/segment-anything/editor/convert-image-to-3d  
  tags:
    - tag: Python  
    - tag: PyTorch  
    - tag: 3D Reconstruction  
    - tag: Computer Vision  
    - tag: Single-Image-to-3D  


- name: "UnderTheHood"
  descr: "Free weekly technical newsletter that takes one open-source system apart at a time — architecture, real trade-offs, every claim cited to Wikipedia, DeepWiki, GitHub, or DBDB (never hallucinated). Fully autonomous content pipeline: a Railway cron job scrapes GitHub trending + Hacker News, enriches candidates from pre-structured sources, auto-picks the week's subject, and has Claude Haiku restyle the input into a consistent voice (~$0.15 per issue with prompt caching). React 19 + Vite + Tailwind frontend in a tech-terminal theme with glossary hovers; FastAPI + Postgres on Railway; Resend for transactional email from a Route 53-verified custom domain; end-to-end signup, double-opt-in, one-click unsubscribe."
  demo: https://underthehood-production.up.railway.app/
  tags:
    - tag: React
    - tag: TypeScript
    - tag: Tailwind
    - tag: FastAPI
    - tag: Python
    - tag: Postgres
    - tag: Anthropic
    - tag: Railway
    - tag: Resend
    - tag: AWS

